<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RumbleTip</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      min-height: 280px;
      font-family: ui-monospace, "Cascadia Code", "Fira Code", monospace;
      background: #0a0a0a;
      color: #e5e5e5;
      padding: 20px 16px;
      -webkit-font-smoothing: antialiased;
    }
    .logo-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .logo-icon {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
      display: block;
    }
    .logo-icon svg {
      width: 100%;
      height: 100%;
      display: block;
    }
    .logo-row span {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #ea580c;
    }
    .headline {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.02em;
      line-height: 1.2;
      margin-bottom: 8px;
      color: #fafafa;
    }
    .headline-sub {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #ea580c;
      margin-bottom: 12px;
    }
    .tagline {
      font-size: 11px;
      line-height: 1.5;
      color: #a3a3a3;
      margin-bottom: 16px;
    }
    .cta {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #737373;
    }
    a {
      color: #ea580c;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="logo-row">
    <span class="logo-icon" aria-hidden="true">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
        <rect width="24" height="24" rx="5" fill="#ea580c"/>
        <text x="12" y="16" font-family="system-ui,sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">R</text>
      </svg>
    </span>
    <span>RumbleTip</span>
  </div>
  <h1 class="headline">FIND. TIP. SUPPORT.</h1>
  <p class="headline-sub">RUMBLETIP.</p>
  <p class="tagline">
    AI agent that finds high-potential Rumble creators early and tips them. Deposit USD₮, let the agent analyze engagement and send tips via Rumble’s native wallet.
  </p>
  <p class="cta">
    Go to <a href="https://rumble.com/browse" target="_blank">rumble.com</a> and hover over a video to see Alpha score and Tip via Agent.
  </p>
</body>
</html>
